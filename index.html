<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테이블 주문관리</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#fff7ef;
    text-align:center;
}

.page{ display:none; padding:15px; }
.active{ display:block; }

h2{ margin:20px 0; }

table{
    margin:auto;
    border-spacing:15px;
}

button{
    width:70px;
    height:70px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#ddd;
}

.alert{
    background:#ff4d4d !important;
    color:white;
}

.preview{
    font-size:11px;
    margin-top:4px;
}

.item-row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.counter button{
    width:35px;
    height:35px;
}

.count{
    width:25px;
    text-align:center;
}

.main-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    border:none;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- ================= 메인 ================= -->
<div id="mainPage" class="page active">

<h2>🏮 테이블 현황</h2>

<table>

<tr>
<td><div><button id="t8" onclick="openTable('8')">8</button><div id="p8" class="preview"></div></div></td>
<td><div><button id="t9" onclick="openTable('9')">9</button><div id="p9" class="preview"></div></div></td>
<td><div><button id="t10" onclick="openTable('10')">10</button><div id="p10" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t7" onclick="openTable('7')">7</button><div id="p7" class="preview"></div></div></td>
<td></td>
<td><div><button id="t11" onclick="openTable('11')">11</button><div id="p11" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t6" onclick="openTable('6')">6</button><div id="p6" class="preview"></div></div></td>
<td></td>
<td><div><button id="t12" onclick="openTable('12')">12</button><div id="p12" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t5" onclick="openTable('5')">5</button><div id="p5" class="preview"></div></div></td>
<td></td>
<td><div><button id="t13" onclick="openTable('13')">13</button><div id="p13" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t3" onclick="openTable('3')">3</button><div id="p3" class="preview"></div></div></td>
<td></td>
<td><div><button id="t15" onclick="openTable('15')">15</button><div id="p15" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t2" onclick="openTable('2')">2</button><div id="p2" class="preview"></div></div></td>
<td></td>
<td><div><button id="t16" onclick="openTable('16')">16</button><div id="p16" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t1" onclick="openTable('1')">1</button><div id="p1" class="preview"></div></div></td>
<td></td>
<td><div><button id="t17" onclick="openTable('17')">17</button><div id="p17" class="preview"></div></div></td>
</tr>

<tr>
<td><div><button id="t매" onclick="openTable('매')">매</button><div id="p매" class="preview"></div></div></td>
<td><div><button id="t난" onclick="openTable('난')">난</button><div id="p난" class="preview"></div></div></td>
<td><div><button id="t국" onclick="openTable('국')">국</button><div id="p국" class="preview"></div></div></td>
</tr>

<tr>
<td></td>
<td><div><button id="t특" onclick="openTable('특')">특</button><div id="p특" class="preview"></div></div></td>
<td></td>
</tr>

</table>
</div>

<!-- ================= 주문 ================= -->
<div id="orderPage" class="page">

<h2 id="tableTitle"></h2>

<div id="historyBox" style="background:white;padding:10px;border-radius:10px;margin-bottom:10px;">
📋 추가주문 기록<br>없음
</div>

<div id="orderItems"></div>

<button class="main-btn" onclick="saveOrder()">추가주문 저장</button>
<button class="main-btn" onclick="markDone()">처리 완료</button>
<button class="main-btn" onclick="goBack()">⬅ 돌아가기</button>

</div>

<script>

const items=["맥주","소주","콜라","사이다","후식"];

let currentTable=null;
let tableOrders={};

function openTable(name){
    currentTable=name;
    document.getElementById("tableTitle").innerText=name+" 테이블";
    document.getElementById("mainPage").classList.remove("active");
    document.getElementById("orderPage").classList.add("active");
    loadItems();
    loadHistory();
}

function loadItems(){
    const box=document.getElementById("orderItems");
    box.innerHTML="";

    items.forEach(item=>{
        box.innerHTML+=`
        <div class="item-row">
            <span>${item}</span>
            <div class="counter">
                <button onclick="change('${item}',-1)">-</button>
                <span class="count" id="${item}">0</span>
                <button onclick="change('${item}',1)">+</button>
            </div>
        </div>`;
    });
}

function change(name,val){
    const el=document.getElementById(name);
    let num=parseInt(el.innerText);
    num+=val;
    if(num<0) num=0;
    el.innerText=num;
}

function saveOrder(){
    let summary=[];
    items.forEach(item=>{
        let count=parseInt(document.getElementById(item).innerText);
        if(count>0) summary.push(item+" "+count);
    });

    if(summary.length===0) return;

    if(!tableOrders[currentTable])
        tableOrders[currentTable]=[];

    tableOrders[currentTable].push(summary.join(", "));

    document.getElementById("t"+currentTable).classList.add("alert");
    document.getElementById("p"+currentTable).innerText=summary.slice(0,2).join(", ");

    goBack();
}

function loadHistory(){
    const box=document.getElementById("historyBox");

    if(!tableOrders[currentTable] || tableOrders[currentTable].length===0){
        box.innerHTML="📋 추가주문 기록<br>없음";
        return;
    }

    box.innerHTML="📋 추가주문 기록<br>";
    tableOrders[currentTable].forEach((o,i)=>{
        box.innerHTML+=(i+1)+". "+o+"<br>";
    });
}

function markDone(){
    tableOrders[currentTable]=[];
    document.getElementById("t"+currentTable).classList.remove("alert");
    document.getElementById("p"+currentTable).innerText="";
    goBack();
}

function goBack(){
    document.getElementById("orderPage").classList.remove("active");
    document.getElementById("mainPage").classList.add("active");
}

</script>

</body>
</html>
