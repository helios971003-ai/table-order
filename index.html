<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테이블 주문관리</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#fff7ef;
    text-align:center;
}

.page{ display:none; padding:15px; }
.active{ display:block; }

h2{ margin:20px 0; }

table{
    margin:auto;
    border-spacing:15px;
}

button{
    width:70px;
    height:70px;
    font-size:18px;
    border:none;
    border-radius:14px;
    background:#ddd;
}

.alert{
    background:#ff4d4d !important;
    color:white;
}

.preview{
    font-size:11px;
    margin-top:4px;
}

.item-row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.counter button{
    width:35px;
    height:35px;
}

.count{
    width:25px;
    text-align:center;
}

.main-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
    border:none;
    border-radius:10px;
}
</style>
</head>
<body>

<!-- ================= 메인 ================= -->
<div id="mainPage" class="page active">
<h2>🏮 테이블 현황</h2>

<table>

<tr>
<td><button onclick="openTable('20')" id="t20">20</button><div id="p20" class="preview"></div></td>
<td><button onclick="openTable('19')" id="t19">19</button><div id="p19" class="preview"></div></td>
<td><button onclick="openTable('18')" id="t18">18</button><div id="p18" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('8')" id="t8">8</button><div id="p8" class="preview"></div></td>
<td><button onclick="openTable('9')" id="t9">9</button><div id="p9" class="preview"></div></td>
<td><button onclick="openTable('10')" id="t10">10</button><div id="p10" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('7')" id="t7">7</button><div id="p7" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('11')" id="t11">11</button><div id="p11" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('6')" id="t6">6</button><div id="p6" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('12')" id="t12">12</button><div id="p12" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('5')" id="t5">5</button><div id="p5" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('13')" id="t13">13</button><div id="p13" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('3')" id="t3">3</button><div id="p3" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('15')" id="t15">15</button><div id="p15" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('2')" id="t2">2</button><div id="p2" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('16')" id="t16">16</button><div id="p16" class="preview"></div></td>
</tr>

<tr>
<td><button onclick="openTable('1')" id="t1">1</button><div id="p1" class="preview"></div></td>
<td></td>
<td><button onclick="openTable('17')" id="t17">17</button><div id="p17" class="preview"></div></td>
</tr>

</table>
</div>

<!-- ================= 주문 ================= -->
<div id="orderPage" class="page">
<h2 id="tableTitle"></h2>

<div id="historyBox" style="background:white;padding:10px;border-radius:10px;margin-bottom:10px;">
📋 추가주문 기록<br>없음
</div>

<div id="orderItems"></div>

<button class="main-btn" onclick="saveOrder()">추가주문 저장</button>
<button class="main-btn" onclick="markDone()">처리 완료</button>
<button class="main-btn" onclick="goBack()">⬅ 돌아가기</button>
</div>

<script>

const items=["맥주","소주","콜라","사이다"];
const desserts=["후식"];

let currentTable=null;
let tableOrders={};

function openTable(name){
    currentTable=name;
    document.getElementById("tableTitle").innerText=name+" 테이블";
    document.getElementById("mainPage").classList.remove("active");
    document.getElementById("orderPage").classList.add("active");
    loadItems();
    loadHistory();
}

function loadItems(){
    const box=document.getElementById("orderItems");
    box.innerHTML="";

    items.forEach(item=>{
        box.innerHTML+=`
        <div class="item-row">
            <span>${item}</span>
            <div class="counter">
                <button onclick="change('${item}',-1)">-</button>
                <span class="count" id="${item}">0</span>
                <button onclick="change('${item}',1)">+</button>
            </div>
        </div>`;
    });

    box.innerHTML+=`<hr><b>후식 선택</b><br>`;
    desserts.forEach(d=>{
        box.innerHTML+=`
        <div style="margin:8px;">
            <input type="checkbox" id="${d}">
            <label for="${d}">${d}</label>
        </div>`;
    });
}

function change(name,val){
    const el=document.getElementById(name);
    let num=parseInt(el.innerText);
    num+=val;
    if(num<0) num=0;
    el.innerText=num;
}

function saveOrder(){
    let summary=[];

    items.forEach(item=>{
        let count=parseInt(document.getElementById(item).innerText);
        if(count>0) summary.push(item+" "+count);
    });

    desserts.forEach(d=>{
        if(document.getElementById(d).checked)
            summary.push(d);
    });

    if(summary.length===0) return;

    if(!tableOrders[currentTable])
        tableOrders[currentTable]=[];

    tableOrders[currentTable].push(summary.join(", "));

    document.getElementById("t"+currentTable).classList.add("alert");
    document.getElementById("p"+currentTable).innerText=summary.slice(0,2).join(", ");

    goBack();
}

function loadHistory(){
    const box=document.getElementById("historyBox");

    if(!tableOrders[currentTable] || tableOrders[currentTable].length===0){
        box.innerHTML="📋 추가주문 기록<br>없음";
        return;
    }

    box.innerHTML="📋 추가주문 기록<br>";
    tableOrders[currentTable].forEach((o,i)=>{
        box.innerHTML+=(i+1)+". "+o+"<br>";
    });
}

function markDone(){

    if(!confirm("손님께 갖다드렸나요?")) return;
    if(!confirm("POS기 완료했나요?")) return;

    tableOrders[currentTable]=[];
    document.getElementById("t"+currentTable).classList.remove("alert");
    document.getElementById("p"+currentTable).innerText="";
    goBack();
}

function goBack(){
    document.getElementById("orderPage").classList.remove("active");
    document.getElementById("mainPage").classList.add("active");
}

</script>

</body>
</html>
